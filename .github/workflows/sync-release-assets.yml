name: sync-release-assets

on:
  workflow_dispatch:
  schedule:
    - cron: '37 */6 * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync release assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_REPO: ${{ github.repository }}
          TARGET_BRANCH: main
        run: scripts/sync-release-assets.sh
